{% load static %}

<!DOCTYPE html>
<html>
    <head>
        <title>{% block title %}Beans Bunnies{% endblock %}</title>
        <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-select@1.14.0-beta3/dist/css/bootstrap-select.min.css">
        <link rel="stylesheet" href="{% static 'admin/css/master.css' %}">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap-select@1.14.0-beta3/dist/js/bootstrap-select.min.js"></script>

        <style>
            /* Simple modal styles */
            .bb-modal-backdrop {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                align-items: center;
                justify-content: center;
                z-index: 1000;
            }
            .bb-modal-backdrop.show { display: flex; }
            .bb-modal {
                background: #fff;
                padding: 1.25rem;
                border-radius: 6px;
                max-width: 600px;
                width: 90%;
                box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            }
            .bb-modal-header { display:flex; justify-content:space-between; align-items:center; }
            .bb-modal-close { background:none; border:0; font-size:1.25rem; cursor:pointer; }
        </style>
    </head>
    <body>
        <main>
            <div class="container" style="margin-top:1rem;">
                <div id="titleContainer" class="headingContainer">
                    <img class="headingImage" src="{% static 'admin/img/logo.png' %}" alt="Beans Bunnies">
                    <h1 class="heading">Beans Bunnies</h1>
                </div>

                {% if messages %}
                    <div class="mt-2">
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }}" role="alert">
                                {{ message }}
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}

                {% block content %}
                {% endblock %}
            </div>
        </main>
        <!-- Modal markup: hidden by default, shown by adding class 'show' -->
        <div id="bbModal" class="bb-modal-backdrop" role="dialog" aria-modal="true" aria-hidden="true">
            <div class="bb-modal" role="document">
                <div class="bb-modal-header">
                    <h2 id="bbModalLabel">{% block modal_title %}{% endblock %}</h2>
                    <button type="button" class="bb-modal-close" aria-label="Close" onclick="closeBBModal()">×</button>
                </div>
                <div class="bb-modal-body">
                    {% block modal %}{% endblock %}
                </div>
            </div>
        </div>

        <script type="text/javascript">
            function openBBModal(select = '', sex = '') {
                const m = document.getElementById('bbModal');
                if (!m) return;
                m.classList.add('show');
                m.setAttribute('aria-hidden', 'false');
                document.body.style.overflow = 'hidden';

                $('.selectpicker').selectpicker();
            }
            function closeBBModal() {
                const m = document.getElementById('bbModal');
                if (!m) return;
                m.classList.remove('show');
                m.setAttribute('aria-hidden', 'true');
                document.body.style.overflow = '';
            }
            // Close modal when clicking backdrop
            document.addEventListener('click', function(e){
                const m = document.getElementById('bbModal');
                if (!m) return;
                if (m.classList.contains('show') && e.target === m) closeBBModal();
            });
            // Close on Escape
            document.addEventListener('keydown', function(e){ if (e.key === 'Escape') closeBBModal(); });
            
            // Initialize Bootstrap Select
            $(document).ready(function() {
                $('select.selectpicker').selectpicker();
            });

            function modalVerify() {
                var name = $('#name').val().trim();
                if (!name) {
                    alert('Name is required.');
                    return false;
                }

                var img = $('#image').val();
                if (!img) {
                    alert('Image is required.');
                    return false;
                }

                var parent = $('#parent').val();
                if (parent && parent.length > 0) {
                    var parentIds = parent.map(function(id) { return parseInt(id); });
                    if (parentIds.includes(NaN)) {
                        alert('Invalid parent selection.');
                        return false;
                    }
                }
                if (parent && parent.length > 2) {
                    alert('You can select up to 2 parents.');
                    return false;
                }

                if (parent && parent.length > 1) {
                    var buckCount = $('#parent option:selected').filter(function() {
                        return $(this).data('sex') === 'M';
                    }).length;
                    if (buckCount > 1) {
                        alert('Only one Buck may be selected.');
                        return false;
                    }
                    var doeCount = $('#parent option:selected').filter(function() {
                        return $(this).data('sex') === 'F';
                    }).length;
                    if (doeCount > 1) {
                        alert('Only one Doe may be selected.');
                        return false;
                    }
                }

                var parentids = parent ? parent.map(function(id) { return parseInt(id); }) : [];
                $('#parent_ids').val(parentids.join(','));

                var breed = $('#breed').val().trim();
                if (breed && breed.length > 100) {
                    alert('Breed must be less than 100 characters.');
                    return false;
                }
                if (breed && breed == ""){
                    $('#breed').val('Unknown');
                }
                if (breed && /[^a-zA-Z]/.test(breed)) {
                    alert('Breed can only contain letters.');
                    return false;
                }

                var dob = $('#dob').val();
                if (dob == "") {
                    alert('Date of birth is required.');
                    return false;
                }
                var dobDate = new Date(dob);
                var today = new Date();
                if (isNaN(dobDate.getTime())) {
                    alert('Invalid date of birth.');
                    return false;
                }
                if (dobDate > today) {
                    alert('Date of birth cannot be in the future.');
                    return false;
                }

                var sex = $('#sex').val();
                if (!['M', 'F', 'U'].includes(sex)) {
                    alert('Please select a valid sex.');
                    return false;
                }
                
                return true;
            }
        </script>
    </body>
</html>
